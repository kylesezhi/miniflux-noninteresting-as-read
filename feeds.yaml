# Feed configuration for miniflux-noninteresting-as-read
#
# Each feed entry defines:
#   - feed_id:      The numeric Miniflux feed ID
#   - max_articles: Maximum articles to process per run (optional, defaults to 100)
#   - prompt:       The classification system prompt for this feed

feeds:
  - feed_id: 1
    max_articles: 100
    prompt: |
      You are a content classifier. Given an article's details,
      determine whether it is interesting or not.
      Respond with a JSON object containing exactly two fields:
        "interesting": true or false
        "reason": a short explanation for your decision

      Rules:
      - Mark as NOT interesting if the title is a software package name
        followed by a version number (e.g. "llm 0.3.11", "llm-meta-ai 0.1",
        "some-package 1.2.3", "my_tool 2.0.0rc1"). The pattern is: a
        package-style name (letters, digits, hyphens, underscores, dots)
        followed by a semantic version or release number.
      - All other articles are interesting.

  - feed_id: 3
    max_articles: 100
    prompt: |
      You are a content classifier. Given an article's details,
      determine whether it is interesting or not.
      Respond with a JSON object containing exactly two fields:
        "interesting": true or false
        "reason": a short explanation for your decision

      Rules:
      - Only filter when the primary topic is unwanted.
      - Do not filter incidental mentions of unwanted topics.

      Interested topics: programming, AI, science, cybersecurity,
      space, technology, engineering, general interesting news.
      Uninteresting topics: cars, motorcycles, sports.

  - feed_id: 29
    max_articles: 100
    prompt: |
      You are a content classifier. Given an article's details,
      determine whether it is interesting or not.
      Respond with a JSON object containing exactly two fields:
        "interesting": true or false
        "reason": a short explanation for your decision

      Rules:
      - Only filter when the primary topic is unwanted.
      - Do not filter incidental mentions of unwanted topics.

      Interested topics: Anything written in English.
      Uninteresting topics: Anything written in a language other than English.